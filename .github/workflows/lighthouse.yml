name: Lighthouse CI

on:
  pull_request:
    branches: [ main ]

jobs:
  lhci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Start server and run LHCI
        # Start Next.js in background, wait for port, then run LHCI autorun via npx
        run: |
          npm run ci:start &
          npx -y wait-on http://localhost:3000
          npx -y @lhci/cli autorun --config=.lighthouseci.json
